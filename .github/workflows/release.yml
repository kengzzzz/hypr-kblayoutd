name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(sed -n '/^\[package\]/,/^\[/ s/^version *= *"\([^"]*\)".*/\1/p' Cargo.toml | head -1)"
          if [ -z "$crate" ]; then
            echo "could not read version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$tag" != "$crate" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $crate" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Stage tarball
        run: |
          ver="${GITHUB_REF_NAME#v}"
          dir="hypr-kblayoutd-${ver}-${{ matrix.arch }}"
          mkdir -p "stage/$dir"
          cp target/release/hypr-kblayoutd "stage/$dir/"
          cp -r contrib docs README.md LICENSE "stage/$dir/"
          tar -C stage -czf "${dir}.tar.gz" "$dir"

      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: '*.tar.gz'
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true

      - name: Checksums
        run: sha256sum *.tar.gz | tee sha256sums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            *.tar.gz sha256sums.txt
